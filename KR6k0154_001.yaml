body:
  text: 天台沙門允堪述鈔科分二初題目二初標鈔題四分二舉述號終南二本文三初序分三初如來在日教興二初約制道敘教興二初顯説處原夫二示被機二初指別益寫冶二指通益慈風二今機別敘教興三初愛道五百初請度緣時有二如來鑑機恐陷正法蓋大三慶喜哀請八敬令傳阿難二末後漸將訛善洎如三今師遂伸撰述三初師承有據濡毫被機余忝二遮煩取要勒成篇卷若文三正立宗本傍取會通今所二正宗二初通列篇目勸學二隨篇別解三十初勸學篇二初牒篇名二依篇釋三初分門二別解三初順益二初引大乘經論二初約四經明第一二據二論辨大智二引小乘律論二初明二律此律二引兩論成實二違損二初總引諸經第二二別明律論二初引本宗此律二引異部十誦三業報二初辨威儀第三二明戒分佛告三結勸總計二釋聚篇至三十雜篇三流通二釋聚篇二初牒篇名二隨篇解二初開章二列釋二初通列七聚七初八棄第一二僧殘第二三偷蘭第三四二提第四五提舍第五六吉羅第六七惡説第七二別問名義二初問答名異體同問曰二別釋能所名義二初從能治行立名二初合明言毗二雙結此上二就所詮行立名二初釋因果二名三初通標此下二合解言尸三雙結二初對論強弱雖因二互攝理通若欲二示受隨兩義二初結前生後上明二正明受隨二初明受言受二辨隨二初總釋名義二隨二分示二種三初標顯隨有二歷明二初示二持所言二明兩犯言止三雙結故二三結界篇二初牒篇名二依篇釋二初分門二別解三初定量第一二大界二初牒名開章第二二隨章正辨六初簡緣第一二立相二初引文二初示界相第二二辨界形見論二義判二初立相隨時義云二唱結離過然須三唱形第三四集僧第四五辨欲第五六作法第六三戒場二初牒名分章第三二隨章別釋二初竪標第一二立圖三初敘意示圖第二二覆顯三相今依三結屬宜通上來三擇非第三四唱相二初唱結戒場二初示唱法第四二加羯磨上座二唱結大界二初示唱相次結二加結法上座五解界二初解無場大界第五二解有場大界二初明二解法若有二通示失否此律四集衆篇二初牒篇名二隨篇釋二初開章二列釋三初鳴稚四初引教顯功第一二維那打法既知三翻辨華梵西傳四作相義通五分二集僧二初作法攝第二二自然攝二初明可分別第二二不可分別二不三分齊二初通明四僧第三二結簡淨穢義云五足數篇二初牒篇名二依篇釋二初分門二別解二初釋衆二初通列二部人數二初他部及義加第一二本宗自列相此律三他本共列相和尚二簡辨應法是非三初未言開足義云十二示自言相義云自三避惡離過義云若二簡相二初通簡內外第二二別簡坐立若欲六受欲篇二初牒篇名二隨篇解二初開章二列釋二初欲緣二初牒釋第一二問答問無二説法二初明屏處受欲二初健者廣説二初別明二初明自説第二二辨轉他次明二通問問欲二病人開略二初通示略法此律二別問現相問餘二辨入衆説儀二初示儀對衆二問答四初問合説成否問對二問多坐多立問欲三問遇緣失否問睡四問事訖不來問與七十戒篇二初牒篇名二依篇釋二初分門二別解二初釋名第一二出家七初推功離苦第二二制聽和合五百三立法請師次請四嚴地施座清淨五辭親革俗欲出六説法披剃入道七禮慶悅情度人三受戒二初集僧和白第三二正明受法三初受前方便五分二正受説相我某三別示餘法既知四受衣二初受捨衣法第四二受捨鉢法受鉢五説淨第五六捨墮第六七説戒三初示通別二説第二二辨五德十數二初明五德愛道二辨十數僧祇三明式叉對首八安居第八九受日第九十自恣二初就衆別自恣二初五人已下通別法第十二四人已下對首法對首二示受誦賞罰母論八學戒篇二初牒篇名二隨篇解二初開章二列釋五初翻名第一二乞戒第二三秉法第三四六法第四五行法二初年十八二初明三法第五二十八法僧祇二伸問答二初問授法儀軌問受二問年減開成三初正問成否問學二義斥今非義云三遮其妄引二初正斥妄引或有二辨年十二三初正明相造二問答問何三義解義云九畜衆篇二初牒篇名二依篇釋二初分門二別解二初畜意二初通辨度人第一二別明依止若受二制乞二初明乞示儀第二二問和加法僧作十具戒篇二初牒篇名二隨篇解二初開章二列釋二初由藉第一二本法二初牒章分文第二二隨章正釋十初請師二初通敘請意第一二別示請法三初明請二師二初和尚先明二闍梨注次請二問師名義問何三簡德秉宣二初選德攝人僧祇二詰彼白讀問諸二戒緣二初先陳緣境第二二開彼心懷知所三安置第三四白差第四五出問二初差問所因第五二威儀出問三初問前方便今正二正問遮難二初問難一汝二問遮問巳三問章示察又當六白喚第六七乞戒第七八和白第八九問難第九十正受六初標結導發上心第十二引論證持優劣智度三示量內外推功當廣四檢校離非從正正作五秉法授體記時知是六緣難開加三二此律三至僧二初牒章敘由第三二別陳問答二初總標就中二別列二初問僧來成受一問二問俗舍結受二問三問本法受名三問四問本法僧寺四問五問俗相開受三初總陳問答五問二雙結得否二初問得受問云二問不得問云三縱奪歸宗今兩六問開別送往六問七問尼須結界七問八問本法安置八問九問請師方法九問十問乞戒儀軌十問四戒相三初示説八四二初説八棄第四二示四依次當二受已告陳汝已三義設餘行義云五退捨三初本宗對內衆第五二婆論通餘人婆論三示無知傷歎今時十一六念篇二初牒篇名二依篇